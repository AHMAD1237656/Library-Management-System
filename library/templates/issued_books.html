<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h2>Issued Books</h2>
    <table border="1">
      <tr>
        <th>Book</th>
        <th>Student</th>
        <th>Issue Date</th>
        <th>Return Date</th>
      </tr>
      {% for issue in issues %}
      <tr>
        <td>{{ issue.book.title }}</td>
        <td>{{ issue.student.name }}</td>
        <td>{{ issue.issue_date }}</td>
        <td>{{ issue.return_date }}</td>
      </tr>
      {% endfor %}
    </table>
  </body>
</html>
